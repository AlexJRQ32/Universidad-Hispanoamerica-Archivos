<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Basica</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <h1>Calculadora Basica</h1>
    <section class="calc-header">
        <div class="calc">
            <div class="render-numbers">
                <span></span>
            </div>

            <button class="btn-tecla" data-valor="7">7</button>
            <button class="btn-tecla" data-valor="8">8</button>
            <button class="btn-tecla" data-valor="9">9</button>
            <button class="btn-tecla btn-ecuacion" data-valor="/">
                <i class="fa-solid fa-divide"></i>
            </button>
            <button class="btn-tecla" data-valor="4">4</button>
            <button class="btn-tecla" data-valor="5">5</button>
            <button class="btn-tecla" data-valor="6">6</button>
            <button class="btn-tecla btn-ecuacion" data-valor="*">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <button class="btn-tecla" data-valor="1">1</button>
            <button class="btn-tecla" data-valor="2">2</button>
            <button class="btn-tecla" data-valor="3">3</button>
            <button class="btn-tecla btn-ecuacion" data-valor="-">
                <i class="fa-solid fa-minus"></i>
            </button>
            <button class="btn-tecla btn-clear" onclick="clearCalc()">
                <span>C</span>
            </button>
            <button class="btn-tecla" data-valor="0">0</button>
            <button class="btn-tecla btn-ecuacion" data-valor="=">
                <i class="fa-solid fa-equals"></i>
            </button>
            <button class="btn-tecla btn-ecuacion" data-valor="+">
                <i class="fa-solid fa-plus"></i>
            </button>

        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
