<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Contador de Stock</title>
</head>
<body>
    <h1>Contador de Stock</h1>
    <div class="stock">
        <h2>Producto: <span id="numero">0</span></h2>
        <div class="buttons">
            <button class="button" onclick="disminuir()">-</button>
            <button class="button" onclick="aumentar()">+</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
