<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/styles.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/crud-styles.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/carrito-styles.css">
    <title>Mi Carrito | Rappi'Doz</title>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="carrito-section">
        <div class="seccion-header">
            <h2><i class="fas fa-shopping-cart"></i> Tu Pedido</h2>
        </div>

        <div class="carrito-container">
            
            <div class="carrito-lista">
                
                <article class="carrito-item">
                    <div class="item-info">
                        <div class="item-img-container">
                            <img src="/UI-HTML-CSS/img/burger-food.png" alt="Hamburguesa">
                        </div>
                        <div class="item-detalles">
                            <h3>Classic Burger</h3>
                            <span class="categoria-tag">Hamburguesas</span>
                            <p class="precio-unitario">₡4,500</p>
                        </div>
                    </div>

                    <div class="cantidad-selector">
                        <button class="btn-qty" aria-label="Disminuir">-</button>
                        <span class="qty-number">1</span>
                        <button class="btn-qty" aria-label="Aumentar">+</button>
                    </div>

                    <div class="acciones-der">
                        <button class="btn-accion delete" title="Eliminar del carrito">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </article>

                <article class="carrito-item">
                    <div class="item-info">
                        <div class="item-img-container">
                            <img src="/UI-HTML-CSS/img/pizza-city.png" alt="Pizza">
                        </div>
                        <div class="item-detalles">
                            <h3>Pepperoni Lover</h3>
                            <span class="categoria-tag">Pizza</span>
                            <p class="precio-unitario">₡8,900</p>
                        </div>
                    </div>

                    <div class="cantidad-selector">
                        <button class="btn-qty">-</button>
                        <span class="qty-number">2</span>
                        <button class="btn-qty">+</button>
                    </div>

                    <div class="acciones-der">
                        <button class="btn-accion delete">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </article>

            </div>

            <aside class="resumen-card">
                <h3>Resumen de compra</h3>
                
                <div class="resumen-linea">
                    <span>Subtotal</span>
                    <span>₡22,300</span>
                </div>
                
                <div class="resumen-linea">
                    <span>Costo de envío</span>
                    <span>₡1,500</span>
                </div>
                
                <div class="resumen-linea">
                    <span>Tarifa de servicio</span>
                    <span>₡500</span>
                </div>

                <div class="resumen-total">
                    <span>Total</span>
                    <span>₡24,300</span>
                </div>

                <button type="submit" class="btn-finalizar">
                    CONFIRMAR PEDIDO
                </button>
                
                <p style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--dark-green);">
                    <i class="fas fa-shield-alt"></i> Transacción segura con Rappi'Doz
                </p>
            </aside>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/UI-HTML-CSS/js/main.js"></script>
    <script>
        loadComponent('header-placeholder', '../Components/header.html');
        loadComponent('footer-placeholder', '../Components/footer.html');
    </script>
</body>
</html>
