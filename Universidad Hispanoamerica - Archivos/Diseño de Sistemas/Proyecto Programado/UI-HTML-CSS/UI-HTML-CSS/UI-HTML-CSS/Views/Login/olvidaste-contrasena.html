<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Rappi'Doz</title>
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/login-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="form">
        <h1>Recuperar Contraseña</h1>
        
        <p style="text-align: center; color: white; margin-bottom: 20px;">
            Ingresa tu correo electrónico para enviarte las instrucciones de restablecimiento.
        </p>

        <section>
            <div class="container-translucid">
                <input type="email" placeholder="Correo electrónico" autofocus>
                <i class="fa-solid fa-envelope"></i>
            </div>
        </section>

        <section>
            <div class="container-translucid">
                <input type="submit" id="button" value="Enviar enlace">
            </div>
        </section>

        <div class="register">
            <a href="login.html" id="register">Volver al Inicio de sesión</a>
        </div>
    </div>
</body>
</html>
