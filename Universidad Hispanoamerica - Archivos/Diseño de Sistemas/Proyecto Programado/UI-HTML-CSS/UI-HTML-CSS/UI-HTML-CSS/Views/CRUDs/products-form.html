<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/styles.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/crud-styles.css"> 
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/formularios.css"> 
    <title>Gestionar Producto | Rappi'Doz</title>
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="form-section">
        <div class="form-container">
            <div class="form-header">
                <a href="products-list.html" class="btn-back"><i class="fas fa-arrow-left"></i> Volver</a>
                <h2>Detalles del Platillo</h2>
            </div>

            <form class="product-form">
                <div class="form-main-grid">
                    <div class="form-inputs">
                        <div class="input-group">
                            <label><i class="fas fa-utensils"></i> Nombre del Producto</label>
                            <input type="text" placeholder="Ej. Hamburguesa Doble Queso" required>
                        </div>

                        <div class="input-row">
                            <div class="input-group">
                                <label><i class="fas fa-tag"></i> Categoría</label>
                                <select>
                                    <option>Hamburguesas</option>
                                    <option>Pizzas</option>
                                    <option>Postres</option>
                                    <option>Bebidas</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label><i class="fas fa-colon-sign"></i> Precio (₡)</label>
                                <input type="number" placeholder="4500" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label><i class="fas fa-image"></i> URL de la Imagen</label>
                            <input type="text" placeholder="https://ejemplo.com/imagen.jpg">
                        </div>

                        <div class="input-group">
                            <label><i class="fas fa-align-left"></i> Descripción / Ingredientes</label>
                            <textarea rows="4" placeholder="Describe los ingredientes y preparación..."></textarea>
                        </div>
                    </div>

                    <div class="form-preview" style="display: flex; flex-direction: column; align-items: center;">
                        <span>Imagen del Producto</span>
                        <div style="margin-top: 15px; display: flex; justify-content: center; width: 100%;">
                            <img src="../img/placeholder-food.png" 
                                alt="Preview" 
                                style="width: 250px; 
                                        height: 250px; 
                                        min-width: 250px; 
                                        min-height: 250px; 
                                        border-radius: 50%; 
                                        object-fit: cover; 
                                        border: 4px solid var(--soft-green); 
                                        box-shadow: var(--shadow-standard);
                                        display: block;">
                        </div>
                        <p style="text-align: center; color: var(--dark-green); font-size: 14px; margin-top: 15px; font-weight: 600;">
                            Previsualización
                        </p>
                    </div>

                <div class="form-actions-footer">
                    <button type="button" class="btn-cancelar" onclick="window.history.back()">Descartar Cambios</button>
                    <button type="submit" class="btn-guardar">Guardar Producto</button>
                </div>
            </form>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="/UI-HTML-CSS/js/main.js"></script>
    <script>
        loadComponent('header-placeholder', '../Components/header.html');
        loadComponent('footer-placeholder', '../Components/footer.html');
    </script>
</body>
</html>
