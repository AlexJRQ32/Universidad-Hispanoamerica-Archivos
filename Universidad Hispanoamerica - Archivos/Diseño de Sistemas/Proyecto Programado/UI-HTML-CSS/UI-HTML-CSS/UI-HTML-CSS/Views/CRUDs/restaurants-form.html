<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Restaurante | RappiDoz</title>
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/styles.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/crud-styles.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/formularios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="form-section">
        <div class="form-container">
            <div class="form-header">
                <a href="./restaurants-list.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Volver</a>
                <h2>Configuración del Negocio</h2>
            </div>

            <form action="actualizar_rest.php" method="POST" enctype="multipart/form-data">
                <div class="form-main-grid">
                    
                    <div class="form-inputs">
                        <div class="input-group">
                            <label>Nombre del Restaurante</label>
                            <input type="text" name="nombre_rest" value="Pizzería La Toscana">
                        </div>

                        <div class="input-group">
                            <label>Estado de Operación</label>
                            <select name="estado">
                                <option value="abierto">Abierto (Recibiendo pedidos)</option>
                                <option value="cerrado">Cerrado Temporalmente</option>
                            </select>
                        </div>

                        <div class="input-row">
                            <div class="input-group">
                                <label>Hora Apertura</label>
                                <input type="time" name="abre" value="11:00">
                            </div>
                            <div class="input-group">
                                <label>Hora Cierre</label>
                                <input type="time" name="cierra" value="22:00">
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Dirección del Local</label>
                            <textarea name="ubicacion" rows="2">Mall San Pedro, Local #42</textarea>
                        </div>
                    </div>

                    <div class="form-preview">
                        <span>Logo del Restaurante</span>
                        <div style="text-align: center;">
                            <img src="../img/logo-restaurante.png" id="logo-preview" 
                                style="width: 100%; max-width: 250px; aspect-ratio: 1/1; border-radius: 50%; object-fit: cover; border: 4px solid var(--soft-green);">
                        </div>
                        <input type="file" name="logo" style="margin-top: 10px;">
                    </div>
                </div>

                <div class="form-actions-footer">
                    <a href="./restaurants-list.html" class="btn-cancelar">Descartar</a>
                    <button type="submit" class="btn-guardar">Actualizar Restaurante</button>
                </div>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/UI-HTML-CSS/js/main.js"></script>
    <script>
        loadComponent('header-placeholder', '../Components/header.html');
        loadComponent('footer-placeholder', '../Components/footer.html');
    </script>
</body>
</html>
