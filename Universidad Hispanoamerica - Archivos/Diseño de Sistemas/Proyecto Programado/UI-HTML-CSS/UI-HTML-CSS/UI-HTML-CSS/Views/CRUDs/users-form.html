<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil | RappiDoz</title>
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/styles.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/crud-styles.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/formularios.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="form-section">
        <div class="form-container">
            <div class="form-header">
                <a href="./users-config.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Volver</a>
                <h2>Editar Mi Perfil</h2>
            </div>

            <form action="actualizar_perfil.php" method="POST" enctype="multipart/form-data">
                <div class="form-main-grid">
                    
                    <div class="form-inputs">
                        <div class="input-group">
                            <label>Nombre Completo</label>
                            <input type="text" name="nombre" value="Juan Pérez" required>
                        </div>

                        <div class="input-row">
                            <div class="input-group">
                                <label>Correo Electrónico</label>
                                <input type="email" name="email" value="juan@correo.com" required>
                            </div>
                            <div class="input-group">
                                <label>Teléfono</label>
                                <input type="tel" name="telefono" value="+506 8888-0000">
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Nueva Contraseña</label>
                            <input type="password" name="password" placeholder="Dejar vacío para no cambiar">
                        </div>

                        <div class="input-group">
                            <label>Dirección Principal</label>
                            <textarea name="direccion" rows="3">San José, Costa Rica...</textarea>
                        </div>
                    </div>

                    <div class="form-preview">
                        <span>Foto de Perfil</span>
                        <div style="text-align: center;">
                            <img src="../img/usuario-default.jpg" id="avatar-preview" 
                                style="width: 100%; max-width: 250px; aspect-ratio: 1/1; border-radius: 50%; object-fit: cover; border: 4px solid var(--soft-green);">
                        </div>
                        <input type="file" name="foto" style="margin-top: 10px;">
                    </div>
                </div>

                <div class="form-actions-footer">
                    <a href="./users-config.html" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-guardar">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/UI-HTML-CSS/js/main.js"></script>
    <script>
        loadComponent('header-placeholder', '../Components/header.html');
        loadComponent('footer-placeholder', '../Components/footer.html');
    </script>
</body>
</html>
