<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calificar Servicio | RappiDoz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/styles.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/crud-styles.css"> 
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/formularios.css"> 
    <style>
        /* Estilos específicos para las estrellas */
        .rating-stars {
            display: flex;
            gap: 15px;
            justify-content: center;
            font-size: 35px;
            margin: 20px 0;
        }
        .rating-stars i {
            color: var(--soft-green);
            cursor: pointer;
            transition: var(--transicion-suave);
        }
        .rating-stars i:hover,
        .rating-stars i.active {
            color: #f1c40f; /* Color dorado para estrellas activas */
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="form-section">
        <div class="form-container">
            <div class="form-header">
                <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Volver al Inicio</a>
                <h2>Calificar Experiencia</h2>
            </div>

            <form class="product-form">
                <div class="form-main-grid">
                    <div class="form-inputs">
                        <p style="color: var(--dark-green); margin-bottom: 20px;">Tu opinión nos ayuda a mejorar. ¿Cómo calificarías el servicio de RappiDoz?</p>
                        
                        <div class="input-group">
                            <label>¿Qué tan satisfecho estás?</label>
                            <div class="rating-stars">
                                <i class="fas fa-star" data-value="1"></i>
                                <i class="fas fa-star" data-value="2"></i>
                                <i class="fas fa-star" data-value="3"></i>
                                <i class="fas fa-star" data-value="4"></i>
                                <i class="fas fa-star" data-value="5"></i>
                            </div>
                        </div>

                        <div class="input-group">
                            <label><i class="fas fa-comment-alt"></i> Cuéntanos más (Opcional)</label>
                            <textarea rows="5" placeholder="¿Qué te gustó más? ¿En qué podemos mejorar?"></textarea>
                        </div>

                        <div class="input-group">
                            <label><i class="fas fa-bullhorn"></i> ¿Recomendarías RappiDoz?</label>
                            <select>
                                <option value="si">Definitivamente sí</option>
                                <option value="talvez">Tal vez</option>
                                <option value="no">No por el momento</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-preview" style="display: flex; flex-direction: column; align-items: center;">
                        <span>RappiDoz Experience</span>
                        <div style="margin-top: 15px; display: flex; justify-content: center; width: 100%;">
                            <img src="/UI-HTML-CSS/img/logo final.png" 
                                 alt="Logo App" 
                                 style="width: 200px; 
                                        height: 200px; 
                                        min-width: 200px; 
                                        min-height: 200px; 
                                        border-radius: 50%; 
                                        object-fit: cover; 
                                        border: 4px solid var(--soft-green); 
                                        box-shadow: var(--shadow-standard);
                                        display: block;">
                        </div>
                        <p style="text-align: center; color: var(--dark-green); font-size: 14px; margin-top: 15px; font-weight: 600;">
                            ¡Gracias por elegirnos!
                        </p>
                    </div>
                </div>

                <div class="form-actions-footer">
                    <button type="button" class="btn-cancelar" onclick="window.history.back()">Omitir</button>
                    <button type="submit" class="btn-guardar">Enviar Calificación</button>
                </div>
            </form>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="/UI-HTML-CSS/js/main.js"></script>
    <script>
        loadComponent('header-placeholder', '../Components/header.html');
        loadComponent('footer-placeholder', '../Components/footer.html');

        // Script simple para interactividad de estrellas
        const stars = document.querySelectorAll('.rating-stars i');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                const val = star.getAttribute('data-value');
                stars.forEach(s => {
                    s.classList.remove('active');
                    if(s.getAttribute('data-value') <= val) s.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
