<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rappi'Doz | Explora Sabores</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/search-custom.css">
    <link rel="stylesheet" href="/UI-HTML-CSS/Styles/styles.css">
</head>
<body>
    
    <div id="header-placeholder"></div>

    <main class="main-search">
        
        <section class="search-hero">
            <div class="search-wrapper">
                <h1>Encuentra tu próximo antojo</h1>
                <div class="search-box-custom">
                    <i class="fa-solid fa-magnifying-glass main-icon"></i>
                    <input type="text" placeholder="Restaurantes, platillos, cocinas...">
                    <button class="btn-action-custom">Buscar</button>
                </div>
            </div>
        </section>

        <section class="categories-fluid">
            <h2>Explora por cocina</h2>
            <div class="scroll-container-custom">
                <a href="#" class="category-card-custom">
                    <i class="fa-solid fa-pizza-slice"></i>
                    <span>Italiana</span>
                </a>
                <a href="#" class="category-card-custom">
                    <i class="fa-solid fa-hamburger"></i>
                    <span>Burgers</span>
                </a>
                <a href="#" class="category-card-custom">
                    <i class="fa-solid fa-pepper-hot"></i>
                    <span>Mexicana</span>
                </a>
                <a href="#" class="category-card-custom">
                    <i class="fa-solid fa-bowl-rice"></i>
                    <span>Asiática</span>
                </a>
                <a href="#" class="category-card-custom">
                    <i class="fa-solid fa-ice-cream"></i>
                    <span>Postres</span>
                </a>
            </div>
        </section>

        <section class="results-minimal">
            <div class="section-header">
                <h2>Descubre nuevos lugares</h2>
                <a href="#" class="view-all">Ver todos</a>
            </div>
            
            <div class="grid-results-custom">
                <div class="restaurant-card-minimal">
                    <div class="img-wrapper">
                        <img src="/UI-HTML-CSS/img/pizza-city.png" alt="Pizza City">
                        <span class="rating-badge"><i class="fa-solid fa-star"></i> 4.5</span>
                    </div>
                    <div class="info-minimal">
                        <h3>Pizza City</h3>
                        <p class="cuisine">Italiana • $$$</p>
                        <p class="delivery-info">30-40 min • ₡1000 envío</p>
                    </div>
                </div>

                <div class="restaurant-card-minimal">
                    <div class="img-wrapper">
                        <img src="/UI-HTML-CSS/img/burger-food.png" alt="Burger House">
                        <span class="rating-badge"><i class="fa-solid fa-star"></i> 4.8</span>
                    </div>
                    <div class="info-minimal">
                        <h3>Burger House</h3>
                        <p class="cuisine">Burgers • $$</p>
                        <p class="delivery-info">25-35 min • ₡800 envío</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <div id="footer-placeholder"></div>

    <script src="/UI-HTML-CSS/js/main.js"></script>
    <script>
        // Llamamos a la función para cada pieza
        loadComponent('header-placeholder', '../Components/header.html');
        loadComponent('footer-placeholder', '../Components/footer.html');
    </script>

</body>
</html>
